name: resto image builder

env:
  IMAGE: mercator-resto
  REGISTRY: nexus.mercator-ocean.fr/repository
  REGISTRY_ORG: moi-docker
  REPO: resto

on:
  push:
    branches:
      - master
      - ft-build-mercator-image*
    paths:
      - 'app/**'
      - 'docs/**'
      - 'build/resto/**'
      - '.github/workflows/**'
  release:
    types: [created, edited]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # defaults to shallow checkout
    - uses: actions/checkout@v2

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Print values of all environment variables
      run: printenv
    
    - name: Login to Nexus Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.NEXUS_USERNAME }}
        password: ${{ secrets.NEXUS_PASSWORD }}
    
    - name: Build and Push Image
      if: ${{ (startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/heads/ft-')) && github.event_name != 'release' }}
      run: |

        docker buildx build --push --platform linux/amd64,linux/arm64 --tag ${{ env.REGISTRY }}/${{ env.REGISTRY_ORG }}/${{ env.IMAGE }}:latest --file ./build/resto/Dockerfile .
        
    - name: Tag latest release and push to repository
      if: ${{ github.event_name == 'release' }}
      run: |
        
        # Get latest release tag
        tag=$(git describe --tags --abbrev=0 | sed s/^v//)
        
        docker buildx build --push --platform linux/amd64,linux/arm64 -t ${{ env.REGISTRY }}/${{ env.REGISTRY_ORG }}/${{ env.IMAGE }}:latest -t ${{ env.REGISTRY }}/${{ env.REGISTRY_ORG }}/${{ env.IMAGE }}:$tag --file ./build/resto/Dockerfile .